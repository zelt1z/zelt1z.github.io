<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Builder</title>
<!-- html2canvas Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --pitch-1: #1e7a3d;
    --pitch-2: #1a6d36;
    --pitch-line: rgba(255,255,255,0.85);
    --ink: #e8ede9;
    --paper: #121614;
    --panel: #1a201d;
    --panel-border: #2c3630;
    --muted: #8b9991;
    --main-team: #f2c94c;
    --accent: #2e9e54;
    --accent-dark: #1e7a3d;
    --slot-empty: rgba(0,0,0,0.3);
    --slot-empty-border: rgba(255,255,255,0.4);
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    color-scheme: dark;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand h1 {
    font-size: 19px;
    margin: 0;
    letter-spacing: 0.2px;
    font-weight: 700;
  }

  .brand span.sub {
    font-size: 12.5px;
    color: var(--muted);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--paper);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 6px 10px;
  }

  .control-group label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  select {
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    padding: 4px 2px;
    cursor: pointer;
  }

  select option {
    background-color: var(--panel);
    color: var(--ink);
    font-weight: 600;
  }

  select:focus, button:focus, .roster-item:focus, .slot:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  button.ghost {
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--ink);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  button.ghost:hover {
    background: #252e29;
    border-color: #3d4a42;
  }

  main {
    flex: 1;
    display: flex;
    gap: 20px;
    padding: 20px 24px 28px;
    align-items: flex-start;
  }

  .pitch-column {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  .formation-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .formation-chip {
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--ink);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.15s ease;
  }

  .formation-chip:hover { border-color: var(--accent); }

  .formation-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .capture-area {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 16px;
    width: 100%;
  }

  .bench-wrap {
    position: relative;
    width: 130px;
    flex-shrink: 0;
    max-height: 80vh;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    background: linear-gradient(180deg, #1a201d 0%, #141917 100%);
    border: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 8px;
    gap: 8px;
  }

  .bench-title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.8px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2px;
  }

  .bench-slots {
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    flex: 1;
    width: 100%;
  }

  .bench-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    width: 100%;
  }

  .bench-badge {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--slot-empty);
    border: 3px dashed var(--slot-empty-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    overflow: hidden;
    position: relative;
  }

  .bench-slot.filled .bench-badge {
    border-style: solid;
    background: #10230f;
  }

  .bench-slot.filled .bench-badge img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bench-slot:hover .bench-badge {
    transform: scale(1.08);
    border-color: #fff;
  }

  .bench-slot.pickable .bench-badge {
    border-color: var(--main-team);
    box-shadow: 0 0 0 3px rgba(242, 201, 76, 0.35);
  }

  .bench-empty-icon {
    font-size: 24px;
    color: rgba(255,255,255,0.7);
  }

  .bench-slot-name {
    font-size: 10.5px;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.2px;
    -webkit-text-stroke: 2px #0a0e0b;
    paint-order: stroke fill;
    margin-top: 4px;
    width: 100%;
    text-align: center;
    white-space: normal;
    line-height: 1.1;
    word-wrap: break-word;
  }

  .bench-remove-x {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #d13b3b;
    color: #fff;
    font-size: 13px;
    line-height: 20px;
    text-align: center;
    display: none;
    z-index: 3;
  }

  .bench-slot.filled:hover .bench-remove-x { display: block; }

  .pitch-wrap {
    position: relative;
    flex: 1 1 0;
    width: 0;
    min-width: 0;
    max-height: 80vh;
    aspect-ratio: 3 / 4;
    margin: 0 auto;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow);
    background-color: #1e7a3d;
    background: linear-gradient(
      to bottom,
      #1e7a3d 0%, #1e7a3d 10%,
      #1a6d36 10%, #1a6d36 20%,
      #1e7a3d 20%, #1e7a3d 30%,
      #1a6d36 30%, #1a6d36 40%,
      #1e7a3d 40%, #1e7a3d 50%,
      #1a6d36 50%, #1a6d36 60%,
      #1e7a3d 60%, #1e7a3d 70%,
      #1a6d36 70%, #1a6d36 80%,
      #1e7a3d 80%, #1e7a3d 90%,
      #1a6d36 90%, #1a6d36 100%
    );
  }
  
  .pitch-logo {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 95px;
    height: auto;
    z-index: 1;
    opacity: 0.85;
  }

  svg.pitch-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .slot {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    z-index: 2;
  }

  .slot-badge {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: var(--slot-empty);
    border: 3px dashed var(--slot-empty-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    overflow: hidden;
    position: relative;
  }

  .slot.filled .slot-badge {
    border-style: solid;
    background: #10230f;
  }

  .slot.filled .slot-badge img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .slot:hover .slot-badge {
    transform: scale(1.06);
    border-color: #fff;
  }

  .slot.pickable .slot-badge {
    border-color: var(--main-team);
    box-shadow: 0 0 0 4px rgba(242, 201, 76, 0.35);
  }

  .slot-pos {
    font-size: 16px;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
    margin-top: 3px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }

  .slot-name {
    font-size: 17px;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    -webkit-text-stroke: 3.5px #0a0e0b;
    paint-order: stroke fill;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.9));
    margin-top: 2px;
    width: 170px;
    text-align: center;
    white-space: normal;
    line-height: 1.1;
    word-wrap: break-word;
  }

  .remove-x {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #d13b3b;
    color: #fff;
    font-size: 14px;
    line-height: 22px;
    text-align: center;
    display: none;
    z-index: 3;
  }

  .slot.filled:hover .remove-x { display: block; }

  .empty-icon {
    font-size: 32px;
    color: rgba(255,255,255,0.7);
  }

  .download-btn {
    margin-top: 4px;
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .download-btn:hover {
    background: #252e29;
    border-color: var(--accent);
  }

  .roster-panel {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 110px);
    position: sticky;
    top: 20px;
  }

  .roster-header {
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--panel-border);
  }

  .roster-header h2 {
    margin: 0 0 8px;
    font-size: 15px;
    letter-spacing: 0.3px;
  }

  .roster-search {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--panel-border);
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
  }

  .roster-legend {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--muted);
  }

  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 5px;
  }

  .legend-dot.main { background: var(--main-team); }
  .legend-dot.sub { background: #555; }

  .roster-list {
    overflow-y: auto;
    padding: 8px;
    flex: 1;
  }

  .roster-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.12s ease, border-color 0.12s ease;
  }

  .roster-item:hover {
    background: #232c26;
  }

  .roster-item.selected {
    background: #1e3625;
    border-color: var(--accent);
  }

  .roster-item.placed {
    opacity: 0.45;
  }

  .roster-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #2c3630;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid #3d4a42;
  }

  .roster-info {
    min-width: 0;
    flex: 1;
  }

  .roster-name {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .roster-name.main-team { color: #dcb336; } 

  .roster-tag {
    font-size: 10.5px;
    color: var(--muted);
  }

  .hint-bar {
    padding: 10px 16px;
    border-top: 1px solid var(--panel-border);
    font-size: 12px;
    color: var(--muted);
    background: var(--paper);
    border-radius: 0 0 14px 14px;
  }

  .hint-bar b { color: var(--ink); }

  @media (max-width: 880px) {
    main { flex-direction: column; }
    .roster-panel {
      width: 100%;
      position: static;
      max-height: 420px;
    }
    .pitch-wrap { max-height: none; }
    .bench-wrap { max-height: none; width: 100px; }
  }

  @media (max-width: 560px) {
    .capture-area { gap: 8px; }
    .bench-wrap { width: 76px; padding: 8px 4px; }
    .bench-badge { width: 44px; height: 44px; }
    .bench-slot-name { font-size: 8.5px; -webkit-text-stroke: 1.4px #0a0e0b; }
    .bench-title { font-size: 9.5px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>⚽ AFC Bournemouth</h1>
    <span class="sub">Lineup planner</span>
  </div>
  <div class="controls">
    <!-- NEW LOGO SELECTOR DROPDOWN -->
    <div class="control-group">
      <label for="logoSelect">Team</label>
      <select id="logoSelect">
        <option value="logo.png">AFC Bournemouth</option>
        <option value="england.png">England</option>
      </select>
    </div>
    <div class="control-group">
      <label for="playerCount">Players</label>
      <select id="playerCount"></select>
    </div>
    <div class="control-group">
      <label for="formationSelect">Formation</label>
      <select id="formationSelect"></select>
    </div>
    <button class="ghost" id="clearBtn">Clear pitch</button>
  </div>
</header>

<main>
  <div class="pitch-column">
    <div class="capture-area" id="captureArea">
      <div class="bench-wrap" id="benchWrap">
        <div class="bench-title">Bench</div>
        <div class="bench-slots" id="benchSlotsLayer"></div>
      </div>

      <div class="pitch-wrap" id="pitchWrap">
        <!-- ADDED ID HERE -->
        <img src="logo.png" alt="Logo" class="pitch-logo" id="pitchLogo">

        <svg class="pitch-lines" viewBox="0 0 300 400" preserveAspectRatio="none">
          <rect x="4" y="4" width="292" height="392" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <line x1="4" y1="200" x2="296" y2="200" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <circle cx="150" cy="200" r="36" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <circle cx="150" cy="200" r="2" fill="rgba(255,255,255,0.85)"/>
          <rect x="70" y="4" width="160" height="55" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <rect x="110" y="4" width="80" height="22" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M 115 59 A 36 36 0 0 0 185 59" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <rect x="70" y="341" width="160" height="55" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <rect x="110" y="374" width="80" height="22" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M 115 341 A 36 36 0 0 1 185 341" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M 4 14 A 10 10 0 0 0 14 4" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M 286 4 A 10 10 0 0 0 296 14" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M 4 386 A 10 10 0 0 1 14 396" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M 296 386 A 10 10 0 0 1 286 396" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
        </svg>
        <div id="slotsLayer"></div>
      </div>
    </div>

    <button class="download-btn" id="downloadBtn">
      📸 Save Pitch Image
    </button>
  </div>

  <aside class="roster-panel">
    <div class="roster-header">
      <h2>Roster</h2>
      <input type="text" class="roster-search" id="rosterSearch" placeholder="Search players...">
      <div class="roster-legend">
        <span><span class="legend-dot main"></span>Main Team</span>
        <span><span class="legend-dot sub"></span>Squad</span>
      </div>
    </div>
    <div class="roster-list" id="rosterList"></div>
    <div class="hint-bar">
      <b>Tip:</b> Click a player, then click a pitch slot to place them.
    </div>
  </aside>
</main>

<script>
const FORMATIONS = {
  5: [
    { key: "1-2-1", rows: [1, 2, 1] },
    { key: "1-1-2", rows: [1, 1, 2] },
    { key: "2-1-1", rows: [2, 1, 1] },
    { key: "1-3", rows: [1, 3] },
  ],
  6: [
    { key: "2-2-1", rows: [2, 2, 1] },
    { key: "1-3-1", rows: [1, 3, 1] },
    { key: "2-1-2", rows: [2, 1, 2] },
    { key: "1-2-2", rows: [1, 2, 2] },
  ],
  7: [
    { key: "3-1-2", rows: [3, 1, 2] },
    { key: "2-3-1", rows: [2, 3, 1] },
    { key: "3-2-1", rows: [3, 2, 1] },
    { key: "2-2-2", rows: [2, 2, 2] },
    { key: "1-3-2", rows: [1, 3, 2] },
  ],
  8: [
    { key: "3-2-2", rows: [3, 2, 2] },
    { key: "3-3-1", rows: [3, 3, 1] },
    { key: "2-3-2", rows: [2, 3, 2] },
    { key: "2-4-1", rows: [2, 4, 1] },
    { key: "3-1-3", rows: [3, 1, 3] },
  ],
  9: [
    { key: "3-3-2", rows: [3, 3, 2] },
    { key: "4-3-1", rows: [4, 3, 1] },
    { key: "3-2-3", rows: [3, 2, 3] },
    { key: "4-2-2", rows: [4, 2, 2] },
    { key: "2-4-2", rows: [2, 4, 2] },
  ],
  10: [
    { key: "4-3-2", rows: [4, 3, 2] },
    { key: "3-4-2", rows: [3, 4, 2] },
    { key: "4-4-1", rows: [4, 4, 1] },
    { key: "3-3-3", rows: [3, 3, 3] },
    { key: "4-2-3", rows: [4, 2, 3] },
  ],
  11: [
    { key: "4-4-2", rows: [4, 4, 2] },
    { key: "4-3-3", rows: [4, 3, 3] },
    { key: "3-5-2", rows: [3, 5, 2] },
    { key: "4-5-1", rows: [4, 5, 1] },
    { key: "3-4-3", rows: [3, 4, 3] },
    { key: "5-3-2", rows: [5, 3, 2] },
  ],
};

let players = [];           
let playerCount = 7;
let formationKey = FORMATIONS[7][0].key;
let assignments = {};       
let benchAssignments = { B0: null, B1: null, B2: null, B3: null, B4: null };
let selectedPlayerId = null;

function buildSlots(rows) {
  const slots = [];
  slots.push({ id: "GK", label: "GK", row: 0 });
  const totalRows = rows.length;
  rows.forEach((count, rowIndex) => {
    for (let i = 0; i < count; i++) {
      slots.push({
        id: "R" + rowIndex + "-" + i,
        label: rowLabel(rowIndex, totalRows),
        row: rowIndex + 1,
        posInRow: i,
        countInRow: count,
      });
    }
  });
  return slots;
}

function rowLabel(rowIndex, totalRows) {
  if (totalRows === 1) return "FWD";
  if (rowIndex === 0) return "DEF";
  if (rowIndex === totalRows - 1) return "FWD";
  if (totalRows === 2) return rowIndex === 0 ? "DEF" : "FWD";
  return "MID";
}

function computeCoords(rows) {
  const totalRows = rows.length;
  const coords = {};
  coords["GK"] = { x: 150, y: 360 };

  const yNearGK = 290;
  const yFarFromGK = 65;
  rows.forEach((count, rowIndex) => {
    const y = totalRows === 1
      ? (yNearGK + yFarFromGK) / 2
      : yNearGK + (rowIndex * (yFarFromGK - yNearGK)) / (totalRows - 1);
    for (let i = 0; i < count; i++) {
      const x = (300 * (i + 1)) / (count + 1);
      coords["R" + rowIndex + "-" + i] = { x, y };
    }
  });
  return coords;
}

function renderPlayerCountOptions() {
  const sel = document.getElementById("playerCount");
  sel.innerHTML = "";
  Object.keys(FORMATIONS).map(Number).sort((a,b)=>a-b).forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.textContent = n + " players";
    if (n === playerCount) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderFormationOptions() {
  const sel = document.getElementById("formationSelect");
  sel.innerHTML = "";
  FORMATIONS[playerCount].forEach(f => {
    const opt = document.createElement("option");
    opt.value = f.key;
    opt.textContent = f.key + " (" + (playerCount - 1) + "+GK)";
    if (f.key === formationKey) opt.selected = true;
    sel.appendChild(opt);
  });
}

function currentFormation() {
  return FORMATIONS[playerCount].find(f => f.key === formationKey) || FORMATIONS[playerCount][0];
}

function renderPitch() {
  const formation = currentFormation();
  const slots = buildSlots(formation.rows);
  const coords = computeCoords(formation.rows);
  const layer = document.getElementById("slotsLayer");
  layer.innerHTML = "";

  const validIds = new Set(slots.map(s => s.id));
  Object.keys(assignments).forEach(slotId => {
    if (!validIds.has(slotId)) delete assignments[slotId];
  });

  slots.forEach(slot => {
    const coord = coords[slot.id];
    const div = document.createElement("div");
    div.className = "slot";
    div.style.left = (coord.x / 300 * 100) + "%";
    div.style.top = (coord.y / 400 * 100) + "%";
    div.tabIndex = 0;
    div.setAttribute("role", "button");
    div.setAttribute("aria-label", slot.label + " slot");

    const playerId = assignments[slot.id];
    const player = playerId ? players.find(p => p.id === playerId) : null;

    const badge = document.createElement("div");
    badge.className = "slot-badge";

    if (player) {
      div.classList.add("filled");
      if (player.avatar) {
        const img = document.createElement("img");
        img.src = player.avatar;
        img.alt = player.name;
        img.onerror = () => { img.style.display = "none"; badge.textContent = initials(player.name); badge.style.color = "#fff"; badge.style.fontWeight = "700"; badge.style.fontSize="20px"; };
        badge.appendChild(img);
      } else {
        badge.textContent = initials(player.name);
        badge.style.color = "#fff";
        badge.style.fontWeight = "700";
        badge.style.fontSize = "20px";
      }
      const removeX = document.createElement("div");
      removeX.className = "remove-x";
      removeX.textContent = "×";
      removeX.title = "Remove from pitch";
      removeX.onclick = (e) => {
        e.stopPropagation();
        delete assignments[slot.id];
        renderPitch();
        renderRoster();
      };
      div.appendChild(removeX);
    } else {
      const icon = document.createElement("div");
      icon.className = "empty-icon";
      icon.textContent = "+";
      badge.appendChild(icon);
      if (selectedPlayerId) div.classList.add("pickable");
    }

    div.appendChild(badge);

    const posLabel = document.createElement("div");
    posLabel.className = "slot-pos";
    posLabel.textContent = slot.label;
    div.appendChild(posLabel);

    if (player) {
      const nameLabel = document.createElement("div");
      nameLabel.className = "slot-name" + (player.mainTeam ? " main-team" : "");
      nameLabel.textContent = player.name;
      div.appendChild(nameLabel);
    }

    div.onclick = () => onSlotClick(slot.id);
    div.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onSlotClick(slot.id); } };

    layer.appendChild(div);
  });
}

function renderBench() {
  const layer = document.getElementById("benchSlotsLayer");
  layer.innerHTML = "";

  const benchIds = ["B0", "B1", "B2", "B3", "B4"];

  benchIds.forEach(slotId => {
    const div = document.createElement("div");
    div.className = "bench-slot";
    div.tabIndex = 0;
    div.setAttribute("role", "button");
    div.setAttribute("aria-label", "Bench slot");

    const playerId = benchAssignments[slotId];
    const player = playerId ? players.find(p => p.id === playerId) : null;

    const badge = document.createElement("div");
    badge.className = "bench-badge";

    if (player) {
      div.classList.add("filled");
      if (player.avatar) {
        const img = document.createElement("img");
        img.src = player.avatar;
        img.alt = player.name;
        img.onerror = () => { img.style.display = "none"; badge.textContent = initials(player.name); badge.style.color = "#fff"; badge.style.fontWeight = "700"; badge.style.fontSize = "13px"; };
        badge.appendChild(img);
      } else {
        badge.textContent = initials(player.name);
        badge.style.color = "#fff";
        badge.style.fontWeight = "700";
        badge.style.fontSize = "13px";
      }
      const removeX = document.createElement("div");
      removeX.className = "bench-remove-x";
      removeX.textContent = "×";
      removeX.title = "Remove from bench";
      removeX.onclick = (e) => {
        e.stopPropagation();
        benchAssignments[slotId] = null;
        renderBench();
        renderRoster();
      };
      div.appendChild(removeX);
    } else {
      const icon = document.createElement("div");
      icon.className = "bench-empty-icon";
      icon.textContent = "+";
      badge.appendChild(icon);
      if (selectedPlayerId) div.classList.add("pickable");
    }

    div.appendChild(badge);

    if (player) {
      const nameLabel = document.createElement("div");
      nameLabel.className = "bench-slot-name";
      nameLabel.textContent = player.name;
      div.appendChild(nameLabel);
    }

    div.onclick = () => onBenchSlotClick(slotId);
    div.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onBenchSlotClick(slotId); } };

    layer.appendChild(div);
  });
}

function onBenchSlotClick(slotId) {
  if (selectedPlayerId) {
    Object.keys(assignments).forEach(sid => {
      if (assignments[sid] === selectedPlayerId) delete assignments[sid];
    });
    Object.keys(benchAssignments).forEach(sid => {
      if (benchAssignments[sid] === selectedPlayerId) benchAssignments[sid] = null;
    });
    benchAssignments[slotId] = selectedPlayerId;
    selectedPlayerId = null;
    renderPitch();
    renderBench();
    renderRoster();
  } else if (benchAssignments[slotId]) {
    selectedPlayerId = benchAssignments[slotId];
    benchAssignments[slotId] = null;
    renderPitch();
    renderBench();
    renderRoster();
  }
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").slice(0,2).toUpperCase();
}

function onSlotClick(slotId) {
  if (selectedPlayerId) {
    Object.keys(assignments).forEach(sid => {
      if (assignments[sid] === selectedPlayerId) delete assignments[sid];
    });
    Object.keys(benchAssignments).forEach(sid => {
      if (benchAssignments[sid] === selectedPlayerId) benchAssignments[sid] = null;
    });
    assignments[slotId] = selectedPlayerId;
    selectedPlayerId = null;
    renderPitch();
    renderBench();
    renderRoster();
  } else if (assignments[slotId]) {
    selectedPlayerId = assignments[slotId];
    delete assignments[slotId];
    renderPitch();
    renderBench();
    renderRoster();
  }
}

function renderRoster() {
  const list = document.getElementById("rosterList");
  const query = document.getElementById("rosterSearch").value.trim().toLowerCase();
  list.innerHTML = "";

  const placedIds = new Set([...Object.values(assignments), ...Object.values(benchAssignments).filter(Boolean)]);
  const benchIds = new Set(Object.values(benchAssignments).filter(Boolean));

  const sorted = [...players].sort((a, b) => {
    if (a.mainTeam !== b.mainTeam) return a.mainTeam ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  sorted
    .filter(p => p.name.toLowerCase().includes(query))
    .forEach(p => {
      const item = document.createElement("div");
      item.className = "roster-item";
      if (p.id === selectedPlayerId) item.classList.add("selected");
      if (placedIds.has(p.id)) item.classList.add("placed");
      item.tabIndex = 0;

      const img = document.createElement("img");
      img.className = "roster-avatar";
      if (p.avatar) img.src = p.avatar;
      img.alt = p.name;
      img.onerror = () => { img.removeAttribute("src"); };

      const info = document.createElement("div");
      info.className = "roster-info";
      const nameEl = document.createElement("div");
      nameEl.className = "roster-name" + (p.mainTeam ? " main-team" : "");
      nameEl.textContent = p.name;
      const tagEl = document.createElement("div");
      tagEl.className = "roster-tag";
      tagEl.textContent = benchIds.has(p.id) ? "On bench" : (placedIds.has(p.id) ? "On pitch" : (p.mainTeam ? "Main Team" : "Squad"));
      info.appendChild(nameEl);
      info.appendChild(tagEl);

      item.appendChild(img);
      item.appendChild(info);

      item.onclick = () => {
        selectedPlayerId = (selectedPlayerId === p.id) ? null : p.id;
        renderRoster();
        renderPitch();
      };
      item.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); item.click(); } };

      list.appendChild(item);
    });
}

// LOGO DROPDOWN EVENT LISTENER
document.getElementById("logoSelect").onchange = (e) => {
  document.getElementById("pitchLogo").src = e.target.value;
};

document.getElementById("playerCount").onchange = (e) => {
  playerCount = Number(e.target.value);
  formationKey = FORMATIONS[playerCount][0].key;
  assignments = {};
  renderFormationOptions();
  renderPitch();
  renderBench();
  renderRoster();
};

document.getElementById("formationSelect").onchange = (e) => {
  formationKey = e.target.value;
  assignments = {};
  renderPitch();
  renderBench();
  renderRoster();
};

document.getElementById("clearBtn").onclick = () => {
  assignments = {};
  benchAssignments = { B0: null, B1: null, B2: null, B3: null, B4: null };
  selectedPlayerId = null;
  renderPitch();
  renderBench();
  renderRoster();
};

document.getElementById("rosterSearch").oninput = renderRoster;

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (selectedPlayerId) { selectedPlayerId = null; renderRoster(); renderPitch(); renderBench(); }
  }
});

document.getElementById("downloadBtn").onclick = () => {
  const captureElement = document.getElementById("captureArea");

  html2canvas(captureElement, {
    useCORS: true,
    backgroundColor: "#121614",
    scale: 2,
    onclone: (clonedDoc) => {
      const clonedPitch = clonedDoc.getElementById("pitchWrap");
      if (clonedPitch) {
        clonedPitch.style.background =
          "linear-gradient(to bottom, #1e7a3d 0%, #1e7a3d 10%, #1a6d36 10%, #1a6d36 20%, #1e7a3d 20%, #1e7a3d 30%, #1a6d36 30%, #1a6d36 40%, #1e7a3d 40%, #1e7a3d 50%, #1a6d36 50%, #1a6d36 60%, #1e7a3d 60%, #1e7a3d 70%, #1a6d36 70%, #1a6d36 80%, #1e7a3d 80%, #1e7a3d 90%, #1a6d36 90%, #1a6d36 100%)";
      }
    }
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "lineup.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
};

async function init() {
  try {
    const res = await fetch('players.json');
    const data = await res.json();
    players = data.map((p, i) => ({ id: "p" + i, ...p }));
  } catch (error) {
    console.error("Could not load players.json:", error);
    players = [];
  }
  
  renderPlayerCountOptions();
  renderFormationOptions();
  renderPitch();
  renderBench();
  renderRoster();
}

init();
</script>
</body>
